plugins {
	id 'net.fabricmc.fabric-loom' version "${loom_version}"
	id 'maven-publish'
}

def formatMinecraftSupportLabel = { String supportRange ->
	def normalizedRange = supportRange.trim()
	if (normalizedRange.contains('-')) {
		return normalizedRange.split('-', 2).collect { it.trim().replaceAll(/(?i)\.x\b/, '.X') }.join('-')
	}
	return normalizedRange.replaceAll(/(?i)\.x\b/, '.X')
}

def buildArchiveName = "${project.archives_base_name}-fabric-${formatMinecraftSupportLabel(project.minecraft_support_range)}"

version = project.mod_version
group = project.maven_group

base {
	archivesName = buildArchiveName
}

repositories {
	maven { url "https://maven.shedaniel.me/" }
	maven { url "https://maven.terraformersmc.com/" }
}

loom {
	splitEnvironmentSourceSets()

	mods {
		"reachcrafting" {
			sourceSet sourceSets.main
			sourceSet sourceSets.client
		}
	}

}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	implementation "net.fabricmc:fabric-loader:${project.loader_version}"

	implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"

	// Optional compile/runtime integrations for config UI support.
	compileOnly "me.shedaniel.cloth:cloth-config-fabric:${project.cloth_config_version}"
	runtimeOnly "me.shedaniel.cloth:cloth-config-fabric:${project.cloth_config_version}"
	compileOnly "com.terraformersmc:modmenu:${project.modmenu_version}"
	runtimeOnly "com.terraformersmc:modmenu:${project.modmenu_version}"
}

processResources {
	inputs.property "version", project.version
	inputs.property "minecraft_support_range", project.minecraft_support_range

	filesMatching("fabric.mod.json") {
		expand(
			"version": inputs.properties.version,
			"minecraft_support_range": inputs.properties.minecraft_support_range
		)
	}
}

tasks.withType(JavaCompile).configureEach {
	options.release = 25
}

java {
	withSourcesJar()
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

jar {
	inputs.property "archivesName", project.base.archivesName
	archiveVersion = "v${project.version}"

	from("LICENSE") {
		rename { "${it}_${inputs.properties.archivesName}"}
	}
}

tasks.named("sourcesJar") {
	archiveVersion = "v${project.version}"
}

tasks.matching { it.name == "remapJar" }.configureEach {
	archiveVersion = "v${project.version}"
}

publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = buildArchiveName
			from components.java
		}
	}

	repositories {
	}
}
